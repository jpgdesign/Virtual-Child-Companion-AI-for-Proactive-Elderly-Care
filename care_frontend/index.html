<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>虛擬兒女互動照護前端</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Shippori+Mincho+B1:wght@600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="hero">
      <div>
        <p class="eyebrow">Interactive Care Frontend</p>
        <h1>虛擬兒女陪伴站</h1>
        <p class="hero-text">
          正式前端已接上 DQN / Q-learning runtime，並支援瀏覽器語音輸入與語音朗讀。
        </p>
      </div>
      <div class="hero-meta">
        <div class="meta-pill">正式互動前端</div>
        <div class="meta-pill">STT / TTS 已接上</div>
        <div class="meta-pill">家屬 Dashboard</div>
      </div>
    </header>

    <main class="layout">
      <section class="chat-panel">
        <div class="panel-head">
          <div>
            <p class="section-label">對話控制</p>
            <h2>長者互動區</h2>
          </div>
          <div class="control-cluster">
            <label class="field">
              <span>演算法</span>
              <select id="algorithm-select">
                <option value="dqn">DQN</option>
                <option value="q_learning">Q-learning</option>
              </select>
            </label>
            <button id="reset-button" class="ghost-button" type="button">重設對話</button>
          </div>
        </div>

        <div id="chat-thread" class="chat-thread" aria-live="polite"></div>

        <div class="composer">
          <div class="composer-tools">
            <button id="listen-button" class="tool-button" type="button">語音輸入</button>
            <button id="speak-toggle" class="tool-button is-active" type="button">語音朗讀開</button>
            <span id="voice-status" class="voice-status">瀏覽器語音待命</span>
          </div>
          <label class="composer-field">
            <span class="visually-hidden">長者輸入</span>
            <textarea id="message-input" rows="3" placeholder="請輸入長者回覆，例如：我今天五點就起床去公園練氣功了"></textarea>
          </label>
          <button id="send-button" class="send-button" type="button">送出訊息</button>
        </div>
      </section>

      <aside class="dashboard">
        <section class="dashboard-card">
          <p class="section-label">Session</p>
          <h2>即時摘要</h2>
          <div id="summary-cards" class="summary-grid"></div>
        </section>

        <section class="dashboard-card">
          <p class="section-label">Slot Progress</p>
          <h2>健康槽位進度</h2>
          <div id="slot-progress" class="slot-stack"></div>
        </section>

        <section class="dashboard-card">
          <p class="section-label">Care Alerts</p>
          <h2>照護提醒</h2>
          <div id="concern-list" class="chip-list"></div>
          <h3 class="subheading">下一步關注</h3>
          <div id="focus-list" class="chip-list"></div>
        </section>

        <section class="dashboard-card">
          <p class="section-label">Caregiver View</p>
          <h2>摘要文字版</h2>
          <pre id="summary-markdown" class="summary-markdown"></pre>
        </section>
      </aside>
    </main>
  </div>

  <script src="./app.js"></script>
</body>
</html>
